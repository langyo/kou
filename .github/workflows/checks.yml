name: Checks

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Tests never fetch fonts at runtime; the cache is pre-populated below.
      KOU_SKIP_FONT_FETCH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Snapshot baselines are pixel-diffed, so the renderer must use the same
      # pinned fonts CI-to-CI and machine-to-machine. Pull the `fonts-v1`
      # archive (built by fonts-release.yml) into the kou font cache before any
      # test runs. Keep this tag in sync with fonts-release.yml's default.
      - name: Prepare pinned test fonts
        run: |
          mkdir -p ~/.cache/kou/fonts
          gh release download fonts-v1 -R "$GITHUB_REPOSITORY" \
            -p 'fonts-v1.zip' --clobber --output fonts.zip
          unzip -o fonts.zip -d ~/.cache/kou/fonts
          ls -la ~/.cache/kou/fonts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

