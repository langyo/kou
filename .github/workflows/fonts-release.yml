name: Font assets

# Package the pinned fonts the snapshot tests render against, and attach them
# to a rolling `fonts` GitHub Release. The CI workflow (`checks.yml`) pulls
# this archive so snapshot baselines stay byte-stable across machines.
#
# This is CI infra, not a versioned product: the Release tag `fonts` is fixed,
# and re-running this workflow simply replaces the attached `fonts.zip` with
# the current pinned fonts. A change to the fonts only affects the commit that
# triggers it (baselines must then be re-blessed with KOU_ACCEPT_SNAPSHOTS=1).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Download pinned fonts
        run: |
          mkdir -p fonts
          # Pinned upstream versions — keep in sync with src/font.rs source_url().
          curl -fsSL -o fonts/FiraCode-Regular.ttf \
            "https://cdn.jsdelivr.net/gh/tonsky/FiraCode@5.2/distr/ttf/FiraCode-Regular.ttf"
          curl -fsSL -o fonts/SourceHanSansSC-Regular.otf \
            "https://cdn.jsdelivr.net/gh/adobe-fonts/source-han-sans@release/SubsetOTF/CN/SourceHanSansCN-Regular.otf"
          # Sanity: both files non-empty.
          test -s fonts/FiraCode-Regular.ttf
          test -s fonts/SourceHanSansSC-Regular.otf
          ls -la fonts/

      - name: Zip
        run: |
          (cd fonts && zip -r ../fonts.zip .)
          ls -la fonts.zip

      - name: Attach to the rolling fonts Release
        uses: softprops/action-gh-release@v2
        with:
          tag: fonts
          name: fonts
          body: |
            Pinned font assets for the `kou` snapshot regression tests.

            Contents:
            - `FiraCode-Regular.ttf` — FiraCode 5.2 (Latin primary)
            - `SourceHanSansSC-Regular.otf` — Source Han Sans SC (CJK fallback)

            This is a rolling release: re-running the workflow replaces
            `fonts.zip`. The CI workflow extracts it into the kou font cache
            before `cargo test` so rendered baselines stay pixel-stable.
          files: fonts.zip
